runtime: nodejs22

automatic_scaling:
  max_instances: 2

handlers:
  # Static assets (JS, CSS, images)
  - url: /assets
    static_dir: dist/assets

  # Favicon
  - url: /favicon.svg
    static_files: dist/favicon.svg
    upload: dist/favicon.svg

  # All other routes → index.html (SPA routing)
  - url: /.*
    static_files: dist/index.html
    upload: dist/index.html
