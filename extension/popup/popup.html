<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: 'Inter', system-ui, sans-serif;
      background: #f9f9ff;
      color: #141b2b;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: #0029c0;
    }
    .status {
      font-size: 12px;
      color: #757687;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #757687;
    }
    .status .dot.recording {
      background: #ba1a1a;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .step-count {
      font-size: 28px;
      font-weight: 900;
      color: #141b2b;
      margin-bottom: 4px;
    }
    .step-label {
      font-size: 11px;
      color: #757687;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:active { transform: scale(0.97); }
    .btn-record {
      background: linear-gradient(135deg, #0029c0, #2142e7);
      color: white;
    }
    .btn-stop {
      background: #ba1a1a;
      color: white;
    }
    .btn-stop:hover { background: #93000a; }
    .host-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #dce2f7;
    }
    .host-label {
      font-size: 10px;
      color: #757687;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .host-input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #c5c5d9;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Inter', system-ui, sans-serif;
      color: #141b2b;
      background: #fff;
    }
    .host-input:focus {
      outline: none;
      border-color: #0029c0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Lucid Capture</h1>
  </div>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
  <div class="step-count" id="stepCount">0</div>
  <div class="step-label">Steps captured</div>
  <button id="actionBtn" class="btn-record">Start Recording</button>

  <div class="host-section">
    <div class="host-label">App Host</div>
    <input type="text" id="hostInput" class="host-input" placeholder="https://lucidcapture.appspot.com">
  </div>

  <script src="../dist/popup/popup.js"></script>
</body>
</html>
