<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Balig+Script&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#edf0ff",
                        "surface-container-highest": "#dce2f7",
                        "on-secondary-container": "#fffbff",
                        "outline": "#757687",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "on-primary": "#ffffff",
                        "surface": "#f9f9ff",
                        "primary": "#0029c0",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#bac3ff",
                        "tertiary-fixed": "#c1e8ff",
                        "tertiary-container": "#006080",
                        "on-secondary-fixed-variant": "#0531c5",
                        "background": "#f9f9ff",
                        "inverse-surface": "#293040",
                        "secondary-fixed": "#dee0ff",
                        "primary-fixed": "#dee0ff",
                        "surface-tint": "#2949ec",
                        "on-tertiary-fixed": "#001e2b",
                        "tertiary": "#00475f",
                        "on-secondary-fixed": "#00105a",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#73d1ff",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#dce2f7",
                        "primary-fixed-dim": "#bbc3ff",
                        "on-primary-container": "#c7cdff",
                        "inverse-primary": "#bbc3ff",
                        "surface-container-high": "#e1e8fd",
                        "on-primary-fixed-variant": "#002ccd",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f1f3ff",
                        "on-primary-fixed": "#000f5d",
                        "surface-dim": "#d3daef",
                        "on-tertiary-container": "#91d9ff",
                        "outline-variant": "#c5c5d9",
                        "secondary-container": "#4b67f3",
                        "on-tertiary-fixed-variant": "#004d67",
                        "primary-container": "#2142e7",
                        "on-background": "#141b2b",
                        "on-surface-variant": "#444656",
                        "surface-container": "#e9edff",
                        "on-surface": "#141b2b",
                        "secondary": "#2d4bd9"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "script": ["Balig Script"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hotspot-pulse::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #2142e7;
            opacity: 0.6;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body class="h-full bg-inverse-surface font-body overflow-hidden selection:bg-primary-container selection:text-white">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-slate-900/40 backdrop-blur-xl">
<div class="flex items-center gap-4">
<span class="text-lg font-bold text-slate-50 tracking-tight">Scene Player (View Only)</span>
</div>
<div class="flex items-center gap-6">
<nav class="flex gap-8">
<a class="text-sm font-medium transition-colors text-blue-400 font-bold border-b-2 border-blue-500 hover:text-white" href="#">Edit</a>
</nav>
<button class="text-sm font-medium text-slate-300 hover:text-white transition-colors scale-95 active:opacity-80 transition-all">
                Close
            </button>
</div>
<!-- Progress Bar Anchor -->
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-slate-800">
<div class="h-full bg-primary-container w-1/3 shadow-[0_0_8px_rgba(33,66,231,0.6)]"></div>
</div>
</header>
<!-- Main Cinematic Canvas -->
<main class="relative h-full flex items-center justify-center p-8 pt-24 pb-32">
<!-- The Curator Frame -->
<div class="relative w-full max-w-6xl aspect-video rounded-2xl overflow-hidden bg-on-background shadow-2xl ring-1 ring-white/10 group">
<img class="w-full h-full object-cover" data-alt="High-fidelity professional software application dashboard screenshot with graphs and tables" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAW4ojaA6Ng6-79Yg0Ls-Kjv2nwV-JZPd3ntwMIYlc-JEIovkObN7zfGT7VDNTdSU68maAvUrwcEP_sPKZFyn2n3bBD6vVNmhvJEurBK6_CahJJM5i4niL4vX-EEMqrrJSAkg8l1QMa2tXrOYl8Rajcg8uBGkdgBLg7j6dzVQWYRn7t5j3H6kNmgGCmrrVKeN6ik3sI_DK3aDeFecy6GPYIj74YcY4A6TGXxC83E1nNoNekn7yKE6NUkk1BdGWJmmGIjmiIwJOsmbg"/>
<!-- Hotspot Interaction -->
<div class="absolute top-[45%] left-[62%] group-hover:scale-110 transition-transform duration-300">
<div class="relative w-6 h-6 bg-primary-container rounded-full shadow-[0_0_20px_rgba(33,66,231,0.8)] hotspot-pulse flex items-center justify-center cursor-pointer">
<div class="w-2.5 h-2.5 bg-white rounded-full z-10"></div>
</div>
<!-- Tooltip -->
<div class="absolute top-10 left-1/2 -translate-x-1/2 whitespace-nowrap px-4 py-2 bg-white text-on-background text-sm font-bold rounded-lg shadow-xl ring-1 ring-black/5">
                    Click to advance
                    <div class="absolute -top-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-white rotate-45"></div>
</div>
</div>
<!-- Annotation (Balig Script) -->
<div class="absolute bottom-12 right-12 font-script text-white text-2xl opacity-80 -rotate-3 pointer-events-none">
                Notice the new sidebar logic...
            </div>
</div>
</main>
<!-- Bottom Player Controls (BottomNavBar Logic) -->
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-center pb-8 px-4">
<nav class="flex items-center gap-1 bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl rounded-full max-w-md mx-auto p-2 border border-white/10 shadow-2xl shadow-black/20">
<!-- Rewind -->
<button class="flex flex-col items-center justify-center text-slate-600 dark:text-slate-300 p-3 hover:bg-white/20 dark:hover:bg-slate-800/50 rounded-full transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="replay_10">replay_10</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-1">Rewind</span>
</button>
<!-- Play (Active State) -->
<button class="flex flex-col items-center justify-center bg-blue-600 text-white rounded-full p-4 shadow-lg shadow-blue-500/40 transition-all duration-200 active:scale-90 mx-2">
<span class="material-symbols-outlined scale-125" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-1">Play</span>
</button>
<!-- Forward -->
<button class="flex flex-col items-center justify-center text-slate-600 dark:text-slate-300 p-3 hover:bg-white/20 dark:hover:bg-slate-800/50 rounded-full transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="forward_10">forward_10</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-1">Forward</span>
</button>
<div class="h-8 w-[1px] bg-slate-400/20 mx-2"></div>
<!-- Settings -->
<button class="flex flex-col items-center justify-center text-slate-600 dark:text-slate-300 p-3 hover:bg-white/20 dark:hover:bg-slate-800/50 rounded-full transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-1">Settings</span>
</button>
</nav>
</div>
<!-- Finished State Overlay (Hidden by Default) -->
<div class="hidden fixed inset-0 z-[60] bg-on-background/90 backdrop-blur-sm flex items-center justify-center">
<div class="text-center max-w-md">
<h2 class="text-display-lg text-white font-bold tracking-tight mb-2">Demo Complete</h2>
<p class="text-slate-400 mb-10 text-lg">You've reached the end of the Project Alpha onboarding tour.</p>
<div class="flex flex-col gap-4 items-center">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 px-8 rounded-full font-bold text-lg shadow-xl hover:shadow-primary/40 transition-all">
                    Replay Demo
                </button>
<a class="text-slate-300 hover:text-white font-medium transition-colors border-b border-white/10 pb-1" href="#">
                    Back to Dashboard
                </a>
</div>
</div>
</div>
<!-- Background Ambiance -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary/10 blur-[100px] rounded-full"></div>
</div>
</body></html>
