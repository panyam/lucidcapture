{{# include "./BasePage.html" #}}

{{ define "HeaderSection" }}
    <!-- Player is full-screen, no header -->
{{ end }}

{{ define "BodySection" }}
<div class="min-h-screen bg-inverse-surface flex flex-col"
     data-component="PlayerView"
     data-project-id="{{ .ProjectID }}">

    <!-- Top bar (auto-hide) -->
    <div id="player-top-bar" class="fixed top-0 left-0 right-0 z-50 transition-opacity duration-500">
        <div class="flex items-center justify-between px-6 py-4">
            <div class="flex items-center gap-3">
                <span id="player-title" class="text-white/90 text-lg font-black tracking-tight">Loading...</span>
                <span id="player-step-counter" class="text-white/40 text-xs font-semibold"></span>
            </div>
            <div class="flex items-center gap-3">
                <a id="player-edit-link" href="#" class="text-white/60 hover:text-white text-xs font-semibold px-3 py-1.5 rounded-full bg-white/10 hover:bg-white/20 transition-colors flex items-center gap-1.5">
                    <span class="material-symbols-outlined" style="font-size:14px">edit</span>
                    Edit
                </a>
                <a href="/dashboard" class="text-white/60 hover:text-white transition-colors">
                    <span class="material-symbols-outlined" style="font-size:24px">close</span>
                </a>
            </div>
        </div>
        <!-- Progress bar -->
        <div class="h-0.5 bg-white/10">
            <div id="player-progress" class="h-full bg-primary transition-all duration-300 ease-out" style="width:0%"></div>
        </div>
    </div>

    <!-- Main canvas -->
    <div class="flex-1 flex items-center justify-center p-8">
        <div id="player-canvas" class="relative w-full max-w-5xl rounded-2xl overflow-hidden shadow-2xl" style="aspect-ratio:16/9">
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="text-center text-inverse-on-surface">
                    <span class="material-symbols-outlined" style="font-size:64px">smart_display</span>
                    <p class="mt-4 text-lg font-semibold">Loading demo...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom controls (auto-hide) -->
    <div id="player-bottom-bar" class="fixed bottom-0 left-0 right-0 z-50 transition-opacity duration-500">
        <div id="player-timeline" class="px-8 mb-2"></div>
        <div class="flex items-center justify-center gap-4 pb-6">
            <button id="player-prev" class="text-white/60 hover:text-white transition-colors disabled:opacity-30">
                <span class="material-symbols-outlined" style="font-size:24px">skip_previous</span>
            </button>
            <button id="player-play" class="w-12 h-12 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center text-white transition-colors backdrop-blur-sm">
                <span class="material-symbols-outlined" style="font-size:28px;font-variation-settings:'FILL' 1">play_arrow</span>
            </button>
            <button id="player-next" class="text-white/60 hover:text-white transition-colors disabled:opacity-30">
                <span class="material-symbols-outlined" style="font-size:24px">skip_next</span>
            </button>
        </div>
    </div>
</div>
{{ end }}

{{ define "PlayerPage" }}
{{ template "BasePage" . }}
{{ end }}
