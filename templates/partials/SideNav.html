{{ define "SideNav" }}
<aside class="h-screen w-64 fixed left-0 top-0 pt-20 bg-slate-50 flex flex-col gap-2 px-4 py-6 z-40">
    <div class="mb-8 px-2 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white font-bold">W</div>
        <div>
            <p class="text-lg font-bold text-slate-900 leading-tight">Workspace</p>
            <p class="text-xs text-slate-500">Pro Plan</p>
        </div>
    </div>
    <div class="space-y-1">
        <a href="/dashboard" class="rounded-xl flex items-center gap-3 px-4 py-3 transition-all duration-200 hover:translate-x-1 {{ if eq .ActiveTab "dashboard" }}bg-white text-blue-700 font-semibold shadow-sm{{ else }}text-slate-500 font-medium hover:bg-slate-100{{ end }}">
            <span class="material-symbols-outlined">video_library</span>
            <span>My Scenes</span>
        </a>
        <a href="#" class="rounded-xl flex items-center gap-3 px-4 py-3 transition-all duration-200 hover:translate-x-1 text-slate-500 font-medium hover:bg-slate-100">
            <span class="material-symbols-outlined">group</span>
            <span>Shared</span>
        </a>
        <a href="#" class="rounded-xl flex items-center gap-3 px-4 py-3 transition-all duration-200 hover:translate-x-1 text-slate-500 font-medium hover:bg-slate-100">
            <span class="material-symbols-outlined">settings</span>
            <span>Settings</span>
        </a>
    </div>
    <div class="mt-auto p-4 bg-surface-container-high rounded-xl">
        <p class="text-xs font-bold text-primary mb-2 uppercase tracking-widest">Growth</p>
        <p class="text-sm font-medium text-slate-700 mb-4">Unlock team features and advanced analytics.</p>
        <button class="w-full bg-primary text-white text-xs font-bold py-2 rounded-lg hover:bg-blue-700 transition-colors">Upgrade to Team</button>
    </div>
</aside>
{{ end }}
